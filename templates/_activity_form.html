{# Reusable activity form. Usage: include with related_kwarg='related_account_id' and related_id=<id> #}
<form class="form inline-form" method="post" action="{{ url_for('activities_new') }}">
  <input type="hidden" name="next" value="{{ request.path }}">
  <input type="hidden" name="{{ related_kwarg }}" value="{{ related_id }}">
  <select name="type">
    {% for t in ACTIVITY_TYPES %}<option value="{{ t }}">{{ t }}</option>{% endfor %}
  </select>
  <input name="subject" placeholder="Subject..." required>
  <input type="date" name="due_date">
  <button class="btn btn-primary" type="submit">Log</button>
</form>
