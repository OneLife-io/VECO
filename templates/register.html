{% extends "base.html" %}
{% block title %}Create account · VECO{% endblock %}
{% block content %}
<div class="auth-card">
  <div class="auth-brand"><span class="logo big">V</span><h1>VECO</h1></div>
  <p class="muted">Create your CRM workspace</p>
  <form method="post" class="form">
    <label>Full name <input name="name" required autofocus></label>
    <label>Email <input type="email" name="email" required></label>
    <label>Password <input type="password" name="password" required minlength="4"></label>
    <button class="btn btn-primary" type="submit">Create account</button>
  </form>
  <p class="muted small">Already have one? <a href="{{ url_for('login') }}">Sign in</a></p>
</div>
{% endblock %}
