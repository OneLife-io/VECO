{% extends "base.html" %}
{% block title %}Sign in · VECO{% endblock %}
{% block content %}
<div class="auth-card">
  <div class="auth-brand"><span class="logo big">V</span><h1>VECO</h1></div>
  <p class="muted">Sign in to your CRM</p>
  <form method="post" class="form">
    <label>Email <input type="email" name="email" required autofocus></label>
    <label>Password <input type="password" name="password" required></label>
    <button class="btn btn-primary" type="submit">Sign in</button>
  </form>
  <p class="muted small">No account? <a href="{{ url_for('register') }}">Create one</a>.</p>
  <p class="muted small">Demo: <code>demo@veco.io / demo</code></p>
</div>
{% endblock %}
