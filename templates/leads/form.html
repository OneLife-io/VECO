{% extends "base.html" %}
{% block title %}{{ 'Edit' if lead else 'New' }} Lead · VECO{% endblock %}
{% block content %}
<div class="page-header"><h1>{{ 'Edit' if lead else 'New' }} Lead</h1></div>
<form method="post" class="form card">
  <div class="grid grid-2">
    <label>First name *<input name="first_name" required value="{{ lead.first_name if lead else '' }}"></label>
    <label>Last name *<input name="last_name" required value="{{ lead.last_name if lead else '' }}"></label>
    <label>Company *<input name="company" required value="{{ lead.company if lead else '' }}"></label>
    <label>Title<input name="title" value="{{ lead.title if lead else '' }}"></label>
    <label>Email<input type="email" name="email" value="{{ lead.email if lead else '' }}"></label>
    <label>Phone<input name="phone" value="{{ lead.phone if lead else '' }}"></label>
    <label>Industry
      <select name="industry">
        <option value="">—</option>
        {% for i in INDUSTRIES %}<option value="{{ i }}" {{ 'selected' if lead and lead.industry == i else '' }}>{{ i }}</option>{% endfor %}
      </select>
    </label>
    <label>Status
      <select name="status">
        {% for s in LEAD_STATUSES %}<option value="{{ s }}" {{ 'selected' if lead and lead.status == s else ('selected' if not lead and s == 'New' else '') }}>{{ s }}</option>{% endfor %}
      </select>
    </label>
    <label>Source
      <select name="source">
        <option value="">—</option>
        {% for s in ['Web', 'Referral', 'Event', 'Cold Outreach', 'Partner', 'Advertising'] %}
          <option value="{{ s }}" {{ 'selected' if lead and lead.source == s else '' }}>{{ s }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Rating
      <select name="rating">
        <option value="">—</option>
        {% for r in ['Hot', 'Warm', 'Cold'] %}<option value="{{ r }}" {{ 'selected' if lead and lead.rating == r else '' }}>{{ r }}</option>{% endfor %}
      </select>
    </label>
    <label>Estimated value<input name="estimated_value" type="number" step="0.01" value="{{ lead.estimated_value if lead else '' }}"></label>
  </div>
  <label>Description<textarea name="description" rows="3">{{ lead.description if lead else '' }}</textarea></label>
  <div class="form-actions">
    <a class="btn" href="{{ url_for('leads_detail', lead_id=lead.id) if lead else url_for('leads_list') }}">Cancel</a>
    <button class="btn btn-primary" type="submit">Save</button>
  </div>
</form>
{% endblock %}
